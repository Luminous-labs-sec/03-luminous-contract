name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: stellar/actions/soroban-gh-action@latest
      - run: cargo build --release
      - run: cargo test
      - run: stellar contract build
